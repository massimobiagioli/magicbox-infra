# Template for the encrypted vault. Copy to
# ansible/inventory/group_vars/all/vault.yml,
# fill in real values, then encrypt it with ansible-vault. The real vault.yml is
# gitignored and never committed. Keys only here — no real secrets.

# Private container registry credentials.
registry_url: "registry.example.local:5000"
registry_username: "<username>"
registry_password: "<password>"

# Portainer administrator password.
portainer_admin_password: "<password>"
