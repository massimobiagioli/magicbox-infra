# Ansible configuration for magicbox-infra.
# The CLI invokes ansible-playbook from the repository root; these defaults keep
# invocations terse and the SSH connection to the Alpine Magicbox predictable.

[defaults]
inventory = inventory/hosts.yml
host_key_checking = True
retry_files_enabled = False
stdout_callback = default
interpreter_python = auto_silent

[ssh_connection]
pipelining = True
